name: Publish Preview Package

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  publish-preview:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build package
        run: |
          cd packages/chroma
          bun run build

      - name: Publish preview to pkg.pr.new
        run: npx pkg-pr-new publish ./packages/chroma

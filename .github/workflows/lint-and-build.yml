name: Lint and Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-build:
    if: github.head_ref != 'changeset-release/main'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
    - uses: actions/checkout@v7

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install
    
    - name: Run linter
      run: |
        cd packages/chroma
        bun run lint

    - name: Typecheck
      run: |
        cd packages/chroma
        bun run typecheck

    - name: Build package
      run: |
        cd packages/chroma
        bun run build
    
    - name: Check build output
      run: |
        cd packages/chroma
        ls -la dist/
        echo "Build completed successfully"
    
    - name: Run unit tests
      run: |
        cd packages/chroma
        bun run test:unit:run
